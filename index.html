<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Quran Web GPRO</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/sidebar.css">
<link rel="stylesheet" href="css/viewer.css">
<link rel="stylesheet" href="css/toolbar.css">
<link rel="stylesheet" href="css/responsive.css">

</head>

<body>

<div class="container-fluid">

<div class="row">

<!-- SIDEBAR -->

<div class="col-lg-3 sidebar">

<h3 class="mt-3">📖 Quran Web GPRO</h3>

<hr>

<div class="btn-group w-100 mb-3">

<button
id="showSurah"
class="btn btn-primary">
📖 Surat
</button>

<button
id="showJuz"
class="btn btn-outline-primary">
📚 Juz
</button>

</div>

<input
id="searchSurah"
class="form-control"
type="text"
placeholder="Cari Surat...">

<br>

<div
class="list-group"
id="surahList">
</div>

<div
class="list-group"
id="juzList"
style="display:none;">
</div>

</div>

<!-- VIEWER -->

<div class="col-lg-9 viewer">

<div class="toolbar">

<button id="next" class="btn btn-primary">
◀ Berikutnya
</button>

<span id="pageNumber">
٢ | ٣
</span>

<button id="prev" class="btn btn-primary">
Sebelumnya ▶
</button>

<button id="bookmark" class="btn btn-warning">
⭐ Bookmark
</button>

<button id="zoomIn" class="btn btn-secondary">
➕
</button>

<button id="zoomOut" class="btn btn-secondary">
➖
</button>

</div>

<div class="book">

<div class="page left" id="leftSheet">

<img
id="leftPage"
src="Medina1/data/N/0003.gif"
alt="Halaman kiri">

</div>

<div class="spine"></div>

<div class="page right" id="rightSheet">

<img
id="rightPage"
src="Medina1/data/N/0002.gif"
alt="Halaman kanan">

</div>

</div>

</div>

</div>

</div>
<script src="js/app.js"></script>
<script src="js/surah.js"></script>
<script src="js/juz.js"></script>

<script>
loadSurah();
loadJuz();
</script>

</body>
</html>
