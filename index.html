<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Quran Web GPRO</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/sidebar.css">
<link rel="stylesheet" href="css/viewer.css">
<link rel="stylesheet" href="css/toolbar.css">
<link rel="stylesheet" href="css/responsive.css">

</head>

<body>

<div class="container-fluid">

<div class="row">

<!-- SIDEBAR -->

<div class="col-lg-3 sidebar">

<h3 class="mt-3">📖 Quran Web GPRO</h3>

<hr>

<input
class="form-control"
placeholder="Cari Surat...">

<br>

<div class="list-group">

<a href="#" class="list-group-item list-group-item-action">Al-Fatihah</a>

<a href="#" class="list-group-item list-group-item-action">Al-Baqarah</a>

<a href="#" class="list-group-item list-group-item-action">Ali Imran</a>

<a href="#" class="list-group-item list-group-item-action">An-Nisa</a>

<a href="#" class="list-group-item list-group-item-action">Al-Ma'idah</a>

</div>

</div>

<!-- VIEWER -->

<div class="col-lg-9 viewer">

<div class="toolbar">

<button id="next" class="btn btn-success">
◀ Berikutnya
</button>

<span id="pageNumber">
2 | 3
</span>

<button id="prev" class="btn btn-success">
Sebelumnya ▶
</button>

</div>

<div class="book">

<img
id="leftPage"
src="Medina1/data/N/0003.gif"
alt="Halaman kiri">

<img
id="rightPage"
src="Medina1/data/N/0002.gif"
alt="Halaman kanan">

</div>

</div>

</div>

</div>

<script src="js/viewer.js"></script>
<script src="js/app.js"></script>

</body>
</html>
